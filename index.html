<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie Needs Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="calculator-card">
            <h1 class="text-center mb-4">🔥 Calorie Needs Calculator</h1>
            
            <form id="calorieForm">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="gender" class="form-label">Gender</label>
                        <select class="form-select" id="gender" required>
                            <option value="" selected disabled>Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="age" class="form-label">Age</label>
                        <input type="number" class="form-control" id="age" placeholder="Enter age" min="1" max="120" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="height" class="form-label">Height (cm)</label>
                        <input type="number" class="form-control" id="height" placeholder="Enter height" min="50" max="300" required>
                    </div>
                    <div class="col-md-6">
                        <label for="weight" class="form-label">Weight (kg)</label>
                        <input type="number" class="form-control" id="weight" placeholder="Enter weight" min="20" max="300" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="activity" class="form-label">Activity Level</label>
                    <select class="form-select" id="activity" required>
                        <option value="" selected disabled>Select Activity Level</option>
                        <option value="1.2">Sedentary (little or no exercise)</option>
                        <option value="1.375">Lightly Active (light exercise 1-3 days/week)</option>
                        <option value="1.55">Moderately Active (moderate exercise 3-5 days/week)</option>
                        <option value="1.725">Very Active (hard exercise 6-7 days/week)</option>
                        <option value="1.9">Extra Active (very hard exercise & physical job)</option>
                    </select>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">Calculate Calories</button>
                    <button type="button" class="btn btn-secondary" id="resetBtn">Reset</button>
                </div>
            </form>

            <div id="results" class="results-section mt-4">
                <h2 class="text-center mb-4">Your Results</h2>
                
                <div class="result-card bmr-card">
                    <h3>BMR</h3>
                    <p class="result-value" id="bmrValue">-- kcal/day</p>
                </div>

                <div class="result-card maintenance-card">
                    <h3>Maintenance</h3>
                    <p class="result-value" id="maintenanceValue">-- kcal/day</p>
                </div>

                <div class="result-card loss-card">
                    <h3>Weight Loss</h3>
                    <p class="result-value" id="lossValue">-- kcal/day</p>
                    <small class="text-muted">-500 kcal/day</small>
                </div>

                <div class="result-card gain-card">
                    <h3>Weight Gain</h3>
                    <p class="result-value" id="gainValue">-- kcal/day</p>
                    <small class="text-muted">+500 kcal/day</small>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
